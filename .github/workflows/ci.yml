name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ForgeCAD runner
        run: cd apps/forge-runner && npm install

      - name: Install OpenSCAD (legacy)
        run: sudo apt-get update && sudo apt-get install -y openscad

      - name: Install API (dev)
        run: cd apps/api && python -m pip install -e ".[dev]"

      - name: pytest
        run: cd apps/api && pytest -q

      - name: Validate builtin templates
        run: bash templates/scripts/validate-all.sh
